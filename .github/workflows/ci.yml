name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: |
          pip install mcp sentence-transformers sqlite-vec python-frontmatter pytest

      - name: Run tests
        env:
          WIKI_PATH: /tmp/wiki
        run: |
          mkdir -p /tmp/wiki
          python -m pytest -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR (main only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker build -t wiki-mcp .
          mkdir -p /tmp/test-wiki
          echo "# Test" > /tmp/test-wiki/test.md
          docker run --rm \
            -v /tmp/test-wiki:/wiki \
            -e WIKI_PATH=/wiki \
            --entrypoint python \
            wiki-mcp -c "
          from core.index import reindex_all
          stats = reindex_all()
          assert stats['added'] == 1, f'Expected 1 added, got {stats}'
          print('Docker smoke test passed')
          "
